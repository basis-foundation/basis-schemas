# BASIS Decision Response — published contract.
#
# This file PUBLISHES the canonical kernel-output shape decided in
# basis-architecture (docs/architecture/ecosystem-contract-inventory.md, §3.9)
# and implemented today by basis-core's DecisionResponse
# (src/basis_core/decisions/models.py and schemas/decision-response.schema.json).
# It does not invent or redesign the shape. Architecture governs; schemas
# publish; implementations consume.
#
# The `lifecycle` is `experimental` because this published contract is new in
# basis-schemas, not because the response shape is unsettled — it is stable and
# in production use in basis-core.

contract:
  name: decision-response
  title: BASIS Decision Response
  version: 0.1.0
  lifecycle: experimental
  governed_by: basis-architecture
  published_by: basis-schemas
  source: docs/architecture/ecosystem-contract-inventory.md
  description: >-
    The result of an authorization evaluation returned by the policy engine: an
    explicit outcome, a human-readable reason, the evaluating policy or component,
    the policy version in effect, an optional failure reason for
    enforcement-boundary denials, and a timezone-aware timestamp. Publishes the
    kernel-output shape decided in basis-architecture and implemented by
    basis-core's DecisionResponse. The response echoes the request_id of the
    decision request it answers, so the two correlate one-to-one. This contract
    defines the response shape only — never the decision semantics, which stay in
    basis-core.
  # The response echoes the request_id of the decision request it answers and is
  # the kernel output paired with that input. Declared here so consumers know the
  # dependency. It carries no action or resource identifier of its own, so it does
  # not depend on the action-string or resource-identifier contracts.
  depends_on:
    - decision-request

decision_response:
  # The kernel output is a single object. These five fields are required; the
  # rest are optional with the defaults below. Unknown fields are rejected:
  # basis-core's JSON Schema sets additionalProperties: false.
  required:
    - request_id
    - outcome
    - reason
    - evaluated_by
    - timestamp
  optional:
    - policy_version
    - failure_reason
  additional_properties: false

  fields:
    - id: request_id
      type: string
      required: true
      non_empty: true
      description: >-
        Echoes the request_id of the corresponding decision request. Non-empty.
        Used to correlate the response with its request and audit record.
    - id: outcome
      type: string
      required: true
      enum:
        - allow
        - deny
        - not_applicable
      description: >-
        The authorization decision. 'allow': the action is permitted, the
        enforcement point proceeds. 'deny': the action is not permitted, the
        enforcement point rejects. 'not_applicable': no policy covered the
        request; the enforcement point applies its configured default (typically
        deny). Always an explicit enum value, never a bare or free-form string.
    - id: reason
      type: string
      required: true
      non_empty: true
      description: >-
        Human-readable explanation of the outcome. Non-empty for every response.
        For 'allow', a brief confirmation of what permitted the action; for
        'deny', what was required versus what the subject held.
    - id: evaluated_by
      type: string
      required: true
      non_empty: true
      description: >-
        Name of the policy or component that produced the decision. Non-empty;
        appears verbatim in audit records. For chain-of-responsibility
        evaluation, this is the first policy that returned a decision.
    - id: policy_version
      type:
        - string
        - "null"
      required: false
      default: null
      description: >-
        Version identifier of the policy set in effect at evaluation time, used
        to correlate decisions with the policy configuration that produced them.
        Null when the enforcement point was not configured with a policy version.
    - id: failure_reason
      type:
        - string
        - "null"
      required: false
      default: null
      enum:
        - malformed_request
        - policy_error
        - audit_error
        - internal_error
        - null
      description: >-
        Set when a denial was caused by an enforcement-boundary failure rather
        than normal policy evaluation; null for decisions produced by the policy
        engine. 'malformed_request': the request failed validation before
        evaluation. 'policy_error': an exception during rule evaluation; the
        engine failed closed. 'audit_error': reserved; the audit write failed but
        the decision is unaffected. 'internal_error': an unexpected exception
        inside the enforcement point.
    - id: timestamp
      type: string
      format: date-time
      required: true
      description: >-
        ISO 8601 timestamp of when the decision was produced. Must be
        timezone-aware (include an offset, e.g. 2026-05-22T14:30:01Z); basis-core
        rejects timezone-naive timestamps.

  # Enumerated value sets, reproduced here so a consumer can validate a response
  # without dereferencing the implementation. These mirror basis-core's
  # DecisionOutcome and FailureReason enums exactly.
  outcome_values:
    - allow
    - deny
    - not_applicable
  failure_reason_values:
    - malformed_request
    - policy_error
    - audit_error
    - internal_error

  constraints:
    - request_id, outcome, reason, evaluated_by, and timestamp are required.
    - request_id, reason, and evaluated_by must be non-empty.
    - outcome must be one of the published outcome values.
    - policy_version, when present, is a string or null.
    - failure_reason, when present and non-null, must be one of the published
      failure-reason values; null indicates a decision produced by normal policy
      evaluation.
    - timestamp must be timezone-aware.
    - Unknown / additional fields are rejected.

  # Where the response is produced and consumed. Informative; it records the
  # boundary ownership decided in basis-architecture, it adds no structure.
  composition:
    produced_by: basis-core      # the kernel evaluates the request and returns the response
    consumed_by: basis-gateway   # the gateway returns the response to the calling enforcement point
    correlated_by: request_id    # echoes the decision request's request_id one-to-one

  examples:
    valid:
      # allow, produced by normal policy evaluation (no failure_reason).
      - request_id: a1b2c3d4-0001-0000-0000-000000000001
        outcome: allow
        reason: Subject holds a role permitted for 'write:hvac:setpoint'.
        evaluated_by: RolePolicyRule
        policy_version: "0.1.0"
        failure_reason: null
        timestamp: "2026-05-22T14:30:01Z"
      # deny by policy (no failure_reason; policy_version may be absent).
      - request_id: a1b2c3d4-0002-0000-0000-000000000002
        outcome: deny
        reason: subject missing required role
        evaluated_by: RolePolicyRule
        timestamp: "2026-05-22T14:30:05Z"
      # not_applicable: no policy covered the request.
      - request_id: a1b2c3d4-0003-0000-0000-000000000003
        outcome: not_applicable
        reason: No policy matched the requested action.
        evaluated_by: PolicyEngine
        policy_version: null
        timestamp: "2026-05-22T14:30:06Z"
      # safe-deny from an enforcement-boundary failure (failure_reason set).
      - request_id: a1b2c3d4-0004-0000-0000-000000000004
        outcome: deny
        reason: Policy evaluation failed due to an internal rule error. Access denied.
        evaluated_by: PolicyEngine
        policy_version: "0.1.0"
        failure_reason: policy_error
        timestamp: "2026-05-22T14:30:07Z"
    invalid:
      - reason: missing required request_id
        value:
          outcome: allow
          reason: permitted
          evaluated_by: RolePolicyRule
          timestamp: "2026-05-22T14:30:01Z"
      - reason: empty request_id (malformed correlation id)
        value:
          request_id: ""
          outcome: allow
          reason: permitted
          evaluated_by: RolePolicyRule
          timestamp: "2026-05-22T14:30:01Z"
      - reason: missing required outcome
        value:
          request_id: a1b2c3d4-1003-0000-0000-000000000003
          reason: permitted
          evaluated_by: RolePolicyRule
          timestamp: "2026-05-22T14:30:01Z"
      - reason: invalid outcome / decision value
        value:
          request_id: a1b2c3d4-1004-0000-0000-000000000004
          outcome: maybe
          reason: permitted
          evaluated_by: RolePolicyRule
          timestamp: "2026-05-22T14:30:01Z"
      - reason: missing required reason
        value:
          request_id: a1b2c3d4-1005-0000-0000-000000000005
          outcome: deny
          evaluated_by: RolePolicyRule
          timestamp: "2026-05-22T14:30:01Z"
      - reason: missing required evaluated_by
        value:
          request_id: a1b2c3d4-1006-0000-0000-000000000006
          outcome: allow
          reason: permitted
          timestamp: "2026-05-22T14:30:01Z"
      - reason: missing required timestamp
        value:
          request_id: a1b2c3d4-1007-0000-0000-000000000007
          outcome: allow
          reason: permitted
          evaluated_by: RolePolicyRule
      - reason: invalid failure_reason value
        value:
          request_id: a1b2c3d4-1008-0000-0000-000000000008
          outcome: deny
          reason: denied
          evaluated_by: PolicyEngine
          failure_reason: boom
          timestamp: "2026-05-22T14:30:01Z"
      - reason: malformed policy_version (not a string or null)
        value:
          request_id: a1b2c3d4-1009-0000-0000-000000000009
          outcome: allow
          reason: permitted
          evaluated_by: RolePolicyRule
          policy_version: 123
          timestamp: "2026-05-22T14:30:01Z"
      - reason: unknown / additional field rejected
        value:
          request_id: a1b2c3d4-1010-0000-0000-000000000010
          outcome: allow
          reason: permitted
          evaluated_by: RolePolicyRule
          timestamp: "2026-05-22T14:30:01Z"
          confidence: 0.97
