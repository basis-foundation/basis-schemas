# BASIS Identity Evidence Reference — published contract.
#
# This file PUBLISHES the safe-reference shape for trusted identity evidence,
# decided in basis-architecture's operation-aware schema readiness plan
# (ADR-0005, docs/architecture/operation-aware-schema-readiness-plan.md,
# "PR B — Evidence Reference Contracts"). It lets future operation-aware
# request, trace, audit, and explanation contracts identify the trusted
# identity evidence that supported a subject context WITHOUT embedding raw
# access tokens, ID tokens, JWTs, refresh tokens, cookies, session secrets,
# authorization headers, client secrets, passwords, private keys, or complete
# unredacted claim sets.
#
# This contract publishes a reference *shape* only. It does not define
# identity establishment, authentication, claim validation, token
# verification, evidence storage, evidence retrieval, evidence retention,
# evidence signing, evidence verification, runtime hashing behavior,
# authorization evaluation, or enforcement — all of that stays exactly where
# it already lives (basis-identity produces the evidence and mints reference
# values; basis-gateway and basis-core consume references as request context;
# basis-console displays redacted reference metadata).
#
# The `lifecycle` is `experimental` because this published contract is new in
# basis-schemas, not because the underlying need for a safe identity-evidence
# reference is unsettled.

contract:
  name: identity-evidence-reference
  title: BASIS Identity Evidence Reference
  version: 0.1.0
  lifecycle: experimental
  governed_by: basis-architecture
  published_by: basis-schemas
  source: docs/architecture/operation-aware-schema-readiness-plan.md
  description: >-
    A safe reference to trusted identity evidence: a stable reference
    identifier, a structural evidence digest, an identity-provider-neutral
    source label, optional identity-normalization and claim-mapping version
    provenance, a redaction classification, and optional association with a
    decision request and a broader correlated operation. Lets future
    operation-aware request, trace, audit, and explanation contracts identify
    which identity evidence supported a subject context without duplicating
    raw tokens, cookies, credentials, or complete claim sets into those
    artifacts. This contract defines the reference shape only — it does not
    define identity establishment, authentication, claim validation, token
    verification, evidence storage or retrieval, or evidence signing or
    verification, all of which remain owned by basis-identity and the
    components that consume this reference.
  depends_on:
    - contract-metadata
    - redaction-classification

identity_evidence_reference:
  # The reference is a single object. These four fields are required; the
  # rest are optional with the defaults below. Unknown fields are rejected.
  required:
    - reference_id
    - evidence_digest
    - identity_source
    - redaction_classification
  optional:
    - normalization_version
    - mapping_version
    - request_id
    - correlation_id
  additional_properties: false

  fields:
    - id: reference_id
      type: string
      required: true
      non_empty: true
      description: >-
        Stable, deterministic identifier for the referenced identity evidence
        artifact. Independent of Python import path, source filename, or
        temporary storage path; safe to place in future request, trace, and
        audit artifacts because it is not itself a secret. UUID v4
        recommended, matching this repository's existing request_id /
        event_id convention; no stricter format is mandated here so future
        evidence producers are not blocked by a premature identifier grammar.
    - id: evidence_digest
      type: object
      required: true
      description: >-
        A structural digest reference for the identity evidence artifact —
        see evidence_digest_shape below. Structural metadata only: this
        contract does not implement, canonicalize, or verify hashing;
        evidence producers (basis-identity) own deterministic digest
        generation.
    - id: identity_source
      type: string
      required: true
      non_empty: true
      description: >-
        Opaque, non-empty label identifying the identity source or authority
        that produced the underlying identity evidence (for example, an
        issuer or provider reference chosen by basis-identity). Deliberately
        provider-neutral: this contract does not require or assume any
        OIDC-specific or JWT-specific shape, so identity providers beyond
        OIDC remain representable without a contract change. Carries no raw
        claims, tokens, or credential material.
    - id: normalization_version
      type:
        - string
        - "null"
      required: false
      default: null
      description: >-
        Version of the identity-normalization mapping (basis-identity) that
        produced the canonical identity context this evidence backs, when the
        producer tracks one. Null or absent when not applicable or not
        tracked. Provenance metadata only; this contract does not define
        normalization behavior.
    - id: mapping_version
      type:
        - string
        - "null"
      required: false
      default: null
      description: >-
        Version of the claim-mapping applied when translating provider claims
        into the canonical identity context, when applicable. Null or absent
        when no claim-mapping was used or the producer does not track one.
    - id: redaction_classification
      type: string
      required: true
      enum:
        - safe_to_expose
        - safe_after_redaction
        - reference_only
        - never_store
        - never_display
      governed_by: redaction-classification
      description: >-
        Handling requirement for the identity evidence artifact this
        reference points to — not a grant of permission to expose it. A
        safe_to_expose classification here does not itself authorize display
        of the underlying evidence; ordinary authorization and access
        controls still apply to whatever view carries this reference. See
        the redaction-classification contract for the full definition of
        each value.
    - id: request_id
      type:
        - string
        - "null"
      required: false
      default: null
      non_empty: true
      description: >-
        The decision request's request_id this identity evidence supports,
        when already known. Non-empty when present; null or absent because
        identity evidence is commonly produced before a specific
        authorization request exists (for example, at login or
        session-establishment time).
    - id: correlation_id
      type:
        - string
        - "null"
      required: false
      default: null
      description: >-
        Optional caller-provided trace identifier for cross-system
        correlation, passed through verbatim (mirrors audit-event's
        correlation_id). Distinct from reference_id, which identifies the
        evidence artifact itself, and from request_id, which associates
        evidence with one specific decision request: correlation_id
        associates evidence with a broader end-to-end operation or workflow.

  # The evidence_digest field's own nested shape, documented the same way
  # audit-event documents its optional trace sub-object (trace_shape).
  evidence_digest_shape:
    required:
      - algorithm
      - value
    additional_properties: false
    fields:
      - id: algorithm
        type: string
        required: true
        non_empty: true
        pattern: "^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
        description: >-
          Open, lowercase kebab-case label identifying the digest algorithm
          (for example sha-256, sha3-256). Not a closed enum: this contract
          validates only that the label is well-formed, not that it names a
          specific approved algorithm. No hashing, canonicalization, or
          verification behavior is implemented or implied.
      - id: value
        type: string
        required: true
        non_empty: true
        pattern: "^[a-f0-9]+$"
        description: >-
          The digest value as lowercase hexadecimal, with no "0x" or
          "algorithm:" prefix, whitespace, or padding. Structural shape only;
          evidence producers own deterministic, canonical digest generation,
          which this contract does not define, and this contract makes no
          tamper-evidence or cryptographic-authenticity claim.

  # Reproduced here so a consumer can validate redaction_classification
  # without dereferencing the redaction-classification contract file.
  redaction_classification_values:
    - safe_to_expose
    - safe_after_redaction
    - reference_only
    - never_store
    - never_display

  constraints:
    - reference_id, evidence_digest, identity_source, and
      redaction_classification are required.
    - reference_id and identity_source must be non-empty strings.
    - evidence_digest must be an object with exactly algorithm and value;
      both are required and non-empty; algorithm must match the algorithm
      pattern; value must match the lowercase-hexadecimal pattern.
    - redaction_classification must be one of the five published
      redaction-classification values.
    - normalization_version and mapping_version, when present, are strings or
      null.
    - request_id, when present and non-null, must be non-empty.
    - correlation_id, when present, is passed through verbatim with no format
      constraint beyond being a string or null.
    - This contract defines no access_token, id_token, refresh_token, jwt,
      bearer_token, authorization_header, cookie, session_secret,
      client_secret, password, private_key, raw_claims, full_claim_set, or
      credential field. Any such field is rejected as unknown.
    - Unknown / additional fields are rejected.

  # Where this reference is produced and consumed. Informative; it records
  # the boundary ownership decided in basis-architecture, it adds no
  # structure.
  composition:
    produced_by: basis-identity   # produces trusted identity evidence and mints reference values
    consumed_by: basis-gateway, basis-core, basis-console  # reference evidence in requests, traces, audit, and explanations without retrieving raw material
    # basis-schemas does not retrieve, authenticate, normalize, or interpret
    # raw identity evidence; it publishes the reference shape only.

  examples:
    valid:
      - reference_id: idev-0001-0000-0000-000000000001
        evidence_digest:
          algorithm: sha-256
          value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
        identity_source: oidc:https://idp.example.com
        normalization_version: "1.0.0"
        mapping_version: "2026-05-01"
        redaction_classification: reference_only
        request_id: a1b2c3d4-0001-0000-0000-000000000001
        correlation_id: null
      - reference_id: idev-0002-0000-0000-000000000002
        evidence_digest:
          algorithm: sha3-256
          value: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b85
        identity_source: basis-local
        redaction_classification: safe_after_redaction
    invalid:
      - reason: missing required reference_id
        value:
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
      - reason: empty reference_id
        value:
          reference_id: ""
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
      - reason: missing required evidence_digest fields
        value:
          reference_id: idev-1001-0000-0000-000000000001
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
      - reason: evidence_digest missing required digest value
        value:
          reference_id: idev-1002-0000-0000-000000000002
          evidence_digest:
            algorithm: sha-256
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
      - reason: invalid digest algorithm format (uppercase)
        value:
          reference_id: idev-1003-0000-0000-000000000003
          evidence_digest:
            algorithm: SHA256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
      - reason: malformed digest value (colon-prefixed, not bare hex)
        value:
          reference_id: idev-1004-0000-0000-000000000004
          evidence_digest:
            algorithm: sha-256
            value: "sha256:9f86d081"
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
      - reason: missing required identity_source
        value:
          reference_id: idev-1005-0000-0000-000000000005
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          redaction_classification: reference_only
      - reason: missing required redaction_classification
        value:
          reference_id: idev-1006-0000-0000-000000000006
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
      - reason: unsupported redaction classification value
        value:
          reference_id: idev-1007-0000-0000-000000000007
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
          redaction_classification: public
      - reason: empty request_id (malformed correlation)
        value:
          reference_id: idev-1008-0000-0000-000000000008
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
          request_id: ""
      - reason: raw access token field rejected (unknown field)
        value:
          reference_id: idev-1009-0000-0000-000000000009
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
          access_token: eyJhbGciOiJSUzI1NiJ9.example.signature
      - reason: raw claim set field rejected (unknown field)
        value:
          reference_id: idev-1010-0000-0000-000000000010
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
          raw_claims:
            sub: alice
            email: alice@example.com
      - reason: unknown / additional field rejected
        value:
          reference_id: idev-1011-0000-0000-000000000011
          evidence_digest:
            algorithm: sha-256
            value: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
          identity_source: oidc:https://idp.example.com
          redaction_classification: reference_only
          confidence: 0.97
