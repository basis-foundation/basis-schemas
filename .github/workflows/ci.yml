name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Single version, no matrix: 3.10 is the floor declared by
      # requires-python and the version pinned in [tool.mypy].
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      # mypy is configured (files = ["src"], strict) to type-check the
      # published package source; this matches the local quality gate.
      - name: Mypy (src)
        run: mypy src
